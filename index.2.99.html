<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLB Core — Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Serif+Display:ital@1&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --teal: #00ffd9;
            --gold: #ffe566;
            --f-mono: 'JetBrains Mono', monospace;
            --f-serif: 'DM Serif Display', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            background-image: url('hero_299.jpg');
            background-size: cover;
            background-position: center 30%;
            background-attachment: fixed;
            color: #fff;
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: env(safe-area-inset-bottom, 0);
            text-align: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: rgba(255, 230, 100, 0.15);
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.95) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- STAGE: 背景風景と漆黒の融合 --- */
        #glb-result-stage {
            position: relative;
            z-index: 1;
            position: relative;
            min-height: 55dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .stage-bg {
            position: absolute;
            inset: 0;
            background-image: url('hero_299.jpg'); /* B案: 空港 */
            background-size: cover;
            background-position: center 30%;
            z-index: 0;
        }

        .stage-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                rgba(0,0,0,0.4) 0%,
                rgba(0,0,0,0.85) 60%,
                rgba(0,0,0,1) 100%);
            z-index: 1;
        }

        .stage-copy {
            position: absolute;
            top: 2rem;
            font-family: var(--f-serif);
            font-style: italic;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            z-index: 2;
        }

        /* --- RESULT --- */
        #glb-result-text {
            position: relative;
            z-index: 3;
            font-size: 2.5rem;
            font-weight: 700;
            padding: 2rem;
            text-align: center;
            word-break: break-word;
            transition: transform 0.3s ease;
        }

        #glb-result-stage.flipped #glb-result-text { transform: rotate(180deg); }

        /* --- CONTROL PANEL --- */
        .cockpit { padding: 1.5rem; max-width: 480px; margin: 0 auto; }
        .btn-group { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; justify-content: center; }

        .tool-btn {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--teal);
            padding: 0.6rem 1.2rem;
            border-radius: 999px;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: var(--f-mono);
        }

        textarea {
            width: 100%;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            padding: 1rem;
            font-family: var(--f-mono);
            font-size: 1rem;
            resize: none;
            outline: none;
            margin-bottom: 1rem;
        }

        .main-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--teal);
            color: #000;
            border: none;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0,255,217,0.3);
        }

        .main-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .lang-select-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
        select {
            flex: 1; background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 0.5rem; border-radius: 8px; font-family: var(--f-mono);
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="glb-result-stage">
            <div class="stage-bg"></div>
            <div class="stage-overlay"></div>
            <div class="stage-copy">Speak. They understand.</div>
            <div id="glb-result-text">IDLE</div>
        </div>

        <div class="cockpit">
            <div class="btn-group">
                <button class="tool-btn" onclick="flip()">FLIP</button>
                <button class="tool-btn" onclick="speak()">SPEAK</button>
                <button class="tool-btn" id="mic-btn" onclick="toggleMic()">MIC</button>
            </div>

            <div class="lang-select-row">
                <select id="l-from"><option value="ja">JAPANESE</option><option value="en">ENGLISH</option></select>
                <span style="color:rgba(255,255,255,0.2)">::</span>
                <select id="l-to"><option value="en">ENGLISH</option><option value="ja">JAPANESE</option></select>
            </div>

            <textarea id="tr-input" placeholder="TYPE_MESSAGE..." rows="3"></textarea>

            <button class="main-btn" id="tr-btn" onclick="doTranslate()">EXECUTE_AI</button>

            <p id="quota-msg" style="font-size: 0.7rem; color: #444; margin-top: 1rem; text-align: center;">CORE_UNLIMITED_ACTIVE</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://smile-friend-engine-125142687526.us-central1.run.app/translate';

        async function doTranslate() {
            const text = document.getElementById('tr-input').value.trim();
            if(!text) return;

            const btn = document.getElementById('tr-btn');
            const resText = document.getElementById('glb-result-text');

            btn.disabled = true;
            resText.textContent = '...';
            resText.style.opacity = '0.5';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        source: document.getElementById('l-from').value,
                        target: document.getElementById('l-to').value,
                        client_id: 'glb-core-noir-v1'
                    })
                });
                const data = await res.json();
                resText.textContent = data.translatedText || 'ERROR';
            } catch (e) {
                resText.textContent = 'CONNECTION_FAILED';
            } finally {
                btn.disabled = false;
                resText.style.opacity = '1';
                fitText();
            }
        }

        function flip() { document.getElementById('glb-result-stage').classList.toggle('flipped'); }

        function speak() {
            const text = document.getElementById('glb-result-text').textContent;
            if(!text || text === 'IDLE') return;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = document.getElementById('l-to').value;
            speechSynthesis.speak(u);
        }

        function fitText() {
            const el = document.getElementById('glb-result-text');
            const len = el.textContent.length;
            el.style.fontSize = len > 50 ? '1.2rem' : len > 20 ? '1.8rem' : '2.5rem';
        }

        // Mic logic (Simple)
        let rec = null;
        function toggleMic() {
            const btn = document.getElementById('mic-btn');
            if (rec) { rec.stop(); rec = null; btn.style.color = ''; return; }
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return alert('Speech not supported');
            rec = new SR();
            rec.lang = document.getElementById('l-from').value;
            rec.onresult = (e) => { document.getElementById('tr-input').value = e.results[0][0].transcript; };
            rec.onend = () => { rec = null; btn.style.color = ''; };
            rec.start();
            btn.style.color = '#ff0000';
        }
    </script>
</body>
</html>
