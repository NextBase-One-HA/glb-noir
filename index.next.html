<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLB — Free Trial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --surface: #0a0a0a; --teal: #00ffd9; --f-mono: 'JetBrains Mono', monospace; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg) url('hero_299.jpg') center 30%/cover no-repeat fixed;
            color: #fff; font-family: var(--f-mono); -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.8) 0%, rgba(0,0,0,1) 100%);
            z-index: -1;
        }
        #glb-result-stage {
            min-height: 40dvh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 2rem;
        }
        .stage-copy { font-family: 'DM Serif Display', serif; font-style: italic; color: rgba(255,255,255,0.3); font-size: 0.8rem; margin-bottom: 1rem; }
        #glb-result-text { font-size: 2.2rem; font-weight: 700; text-align: center; word-break: break-word; transition: transform 0.3s; }
        .cockpit { padding: 1.5rem; max-width: 480px; margin: 0 auto; }
        .tool-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .tool-btn { flex: 1; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: var(--teal); padding: 0.6rem; border-radius: 999px; font-size: 0.7rem; cursor: pointer; }
        textarea { width: 100%; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; padding: 1rem; font-family: var(--f-mono); font-size: 1rem; margin-bottom: 1rem; outline: none; }
        .main-btn { width: 100%; padding: 1.2rem; background: var(--teal); color: #000; border: none; border-radius: 999px; font-weight: 700; letter-spacing: 0.1em; cursor: pointer; }
        .quota-info { font-size: 0.7rem; color: #555; text-align: center; margin-top: 1rem; }
        .flipped #glb-result-text { transform: rotate(180deg); }
    </style>
</head>
<body>
    <div id="app">
        <div id="glb-result-stage">
            <div class="stage-copy">Free Trial: 5 translations today</div>
            <div id="glb-result-text">READY</div>
        </div>
        <div class="cockpit">
            <div class="tool-bar">
                <button class="tool-btn" onclick="document.getElementById('app').classList.toggle('flipped')">FLIP</button>
                <button class="tool-btn" onclick="speak()">SPEAK</button>
                <button class="tool-btn" onclick="startMic()">MIC</button>
            </div>
            <textarea id="ti" placeholder="TYPE_MESSAGE..."></textarea>
            <button class="main-btn" id="tb" onclick="tr()">EXECUTE_FREE_AI</button>
            <div class="quota-info">DAILY_FREE_QUOTA: <span id="q">5</span>_LEFT</div>
        </div>
    </div>
    <script>
        let count = 5;
        const API = 'https://smile-friend-engine-125142687526.us-central1.run.app/translate';
        async function tr() {
            if(count <= 0) return alert('Free limit reached.');
            const text = document.getElementById('ti').value.trim();
            if(!text) return;
            const resText = document.getElementById('glb-result-text');
            resText.style.opacity = '0.5';
            try {
                const r = await fetch(API, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, source: 'ja', target: 'en', client_id: 'glb-free-v1' })
                });
                const d = await r.json();
                resText.textContent = d.translatedText || 'ERROR';
                count--; document.getElementById('q').textContent = count;
            } catch(e) { resText.textContent = 'NETWORK_ERROR'; }
            resText.style.opacity = '1';
        }
        function speak() {
            const u = new SpeechSynthesisUtterance(document.getElementById('glb-result-text').textContent);
            u.lang = 'en-US'; speechSynthesis.speak(u);
        }
        function startMic() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SR) return;
            const r = new SR(); r.lang = 'ja-JP';
            r.onresult = (e) => { document.getElementById('ti').value = e.results[0][0].transcript; };
            r.start();
        }
    </script>
</body>
</html>
