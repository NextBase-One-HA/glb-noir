<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GLB Travel — Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #000000;
      --surface:   #0a0a0a;
      --surface2:  #111111;
      --border:    rgba(255,255,255,0.06);
      --border2:   rgba(255,255,255,0.12);
      --teal:      #00ffd9; /* 唯一のアクセント：サイバーシアン */
      --amber:     #f59e0b;
      --text:      #ffffff;
      --text2:     #888888;
      --text3:     #444444;
      --f-mono:    'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      background-image: url('image_2.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text);
      font-family: var(--f-mono);
      font-size: 14px;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.95) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* --- LAYOUT --- */
    #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* --- GUARD --- */
    #screen-guard { align-items: center; justify-content: center; padding: 2rem; }
    .spinner { width: 20px; height: 20px; border: 1px solid var(--border); border-top-color: var(--teal); animation: spin 1s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- ONBOARDING --- */
    #screen-onboard { padding: 2rem; align-items: center; justify-content: center; }
    .ob-wrap { width: 100%; max-width: 400px; }
    .headline { font-size: 1.2rem; font-weight: 700; margin-bottom: 2rem; letter-spacing: -0.02em; }
    .headline span { color: var(--teal); }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 2rem; }
    .chip {
      padding: 0.8rem 0.2rem; background: var(--surface); border: 1px solid var(--border);
      color: var(--text2); font-size: 0.7rem; text-align: center; cursor: pointer; transition: 0.2s;
    }
    .chip:hover, .chip.selected { border-color: var(--teal); color: var(--teal); background: transparent; }
    .btn {
      width: 100%; padding: 1rem; background: transparent; color: var(--teal); border: 1px solid var(--teal);
      font-family: var(--f-mono); font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .btn:hover:not(:disabled) { background: var(--teal); color: #000; }
    .btn:disabled { border-color: var(--text3); color: var(--text3); cursor: not-allowed; }

    /* --- MAIN APP --- */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem; border-bottom: 1px solid var(--border); background: rgba(10,10,10,0.72); backdrop-filter: blur(10px); }
    .brand { font-weight: 700; font-size: 0.8rem; letter-spacing: 0.1em; color: var(--teal); }
    .lang-pair { display: flex; gap: 0.8rem; align-items: center; cursor: pointer; background: var(--surface); padding: 0.4rem 0.8rem; border: 1px solid var(--border); }
    .lang-code { font-weight: 700; font-size: 0.9rem; }

    .timer-bar { background: rgba(10,10,10,0.72); backdrop-filter: blur(10px); padding: 0.3rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.65rem; color: var(--amber); }

    .scene-strip { display: flex; overflow-x: auto; gap: 0.5rem; padding: 0.8rem 1rem; background: rgba(10,10,10,0.58); backdrop-filter: blur(8px); }
    .scene-pill {
      white-space: nowrap; font-size: 0.7rem; color: var(--text2);
      padding: 0.3rem 0.6rem; cursor: pointer; border: 1px solid transparent;
    }
    .scene-pill.active { color: var(--teal); border: 1px solid var(--teal); }
    .scene-pill::before { content: '[ '; }
    .scene-pill::after { content: ' ]'; }

    .input-area { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
    textarea {
      flex: 1; background: transparent; border: none; color: var(--text);
      font-family: var(--f-mono); font-size: 1.1rem; resize: none; outline: none; min-height: 100px;
    }
    .result-box {
      margin-top: 1rem; padding: 1.5rem; background: var(--surface2); border-left: 2px solid var(--teal);
      display: none; flex-direction: column; gap: 1rem;
    }
    .result-box.show { display: flex; }
    .result-text { font-size: 1.4rem; font-weight: 700; color: var(--text); }

    .actions { display: flex; gap: 1rem; margin-top: 1rem; }
    .action-link { font-size: 0.7rem; color: var(--text2); text-decoration: none; cursor: pointer; border-bottom: 1px solid transparent; }
    .action-link:hover { color: var(--teal); border-bottom-color: var(--teal); }

    .room-footer { padding: 1rem; border-top: 1px solid var(--border); font-size: 0.7rem; display: flex; justify-content: space-between; align-items: center; color: var(--text3); background: rgba(10,10,10,0.7); backdrop-filter: blur(10px); }

    /* Utility */
    .hide { display: none; }
    @media (min-width: 480px) { #app { max-width: 480px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); } }

</style>
</head>

<body>
  <div id="app">
    <div id="screen-guard" class="screen active">
      <div class="spinner"></div>
      <div style="font-size:0.7rem; letter-spacing:0.1em; color:var(--text2)">INITIALIZING...</div>
    </div>

    <div id="screen-onboard" class="screen">
      <div class="ob-wrap">
        <div class="headline">/ SELECT_<br><span>LANGUAGE</span></div>
        <div class="grid" id="lang-grid">
          <div class="chip" data-code="en" onclick="sel(this)">ENGLISH</div>
          <div class="chip" data-code="ja" onclick="sel(this)">JAPANESE</div>
          <div class="chip" data-code="zh" onclick="sel(this)">CHINESE</div>
          <div class="chip" data-code="ko" onclick="sel(this)">KOREAN</div>
          <div class="chip" data-code="es" onclick="sel(this)">SPANISH</div>
          <div class="chip" data-code="fr" onclick="sel(this)">FRENCH</div>
        </div>
        <button class="btn" id="btn-start" disabled onclick="finishOnboarding()">START_CONNECTION</button>
      </div>
    </div>

    <div id="screen-app" class="screen">
      <div class="topbar">
        <div class="brand">GLB//TRVL</div>
        <div class="lang-pair" onclick="swap()">
          <span class="lang-code" id="l-from">EN</span>
          <span style="color:var(--text3)">::</span>
          <span class="lang-code" id="l-to">JA</span>
        </div>
        <div class="action-link">SETTINGS</div>
      </div>

      <div class="timer-bar">PASS_STATUS: ACTIVE // <span id="days">30</span>_DAYS_REMAINING</div>

      <div class="scene-strip">
        <div class="scene-pill active" onclick="setSc(this)">AUTO</div>
        <div class="scene-pill" onclick="setSc(this)">AIRPORT</div>
        <div class="scene-pill" onclick="setSc(this)">HOTEL</div>
        <div class="scene-pill" onclick="setSc(this)">RESTAURANT</div>
        <div class="scene-pill" onclick="setSc(this)">EMERGENCY</div>
      </div>

      <div class="input-area">
        <textarea id="ti" placeholder="TYPE_MESSAGE_HERE..." oninput="checkIn()"></textarea>

        <div id="res" class="result-box">
          <div style="font-size:0.6rem; color:var(--text3); letter-spacing:0.2em">TRANSLATED_OUTPUT</div>
          <div class="result-text" id="rt"></div>
          <div class="actions">
            <span class="action-link" onclick="speak()">[ SPEAK ]</span>
            <span class="action-link" onclick="copy()">[ COPY ]</span>
          </div>
        </div>

        <button class="btn" id="bt" style="margin-top:auto" onclick="tr()">GLB</button>
      </div>

      <div class="room-footer">
        <span>MODE: PREMIUM_NOIR</span>
        <span class="action-link">+ CREATE_ROOM</span>
      </div>
    </div>
  </div>

  <script>
    const state = {
      from: 'en', to: 'ja',
      onboarded: localStorage.getItem('on')
    };

    function sel(el) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      state.from = el.dataset.code;
      document.getElementById('btn-start').disabled = false;
    }

    function finishOnboarding() {
      localStorage.setItem('on', '1');
      show('screen-app');
    }

    function checkIn() {
      if(!document.getElementById('ti').value.trim()) {
        document.getElementById('res').classList.remove('show');
      }
    }

    async function tr() {
      const text = document.getElementById('ti').value.trim();
      if(!text) return;

      const b = document.getElementById('bt');
      b.textContent = 'GLB...';
      b.disabled = true;

      // DEMO DELAY
      await new Promise(r => setTimeout(r, 600));

      document.getElementById('rt').textContent = `>> ${text.toUpperCase()}`;
      document.getElementById('res').classList.add('show');

      b.textContent = 'GLB';
      b.disabled = false;
    }

    function swap() {
      [state.from, state.to] = [state.to, state.from];
      document.getElementById('l-from').textContent = state.from.toUpperCase();
      document.getElementById('l-to').textContent = state.to.toUpperCase();
    }

    function setSc(el) {
      document.querySelectorAll('.scene-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
    }

    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function speak() {
      const u = new SpeechSynthesisUtterance(document.getElementById('rt').textContent);
      u.lang = state.to;
      speechSynthesis.speak(u);
    }

    function copy() {
      navigator.clipboard.writeText(document.getElementById('rt').textContent);
    }

    window.onload = () => {
      setTimeout(() => {
        if(!state.onboarded) show('screen-onboard');
        else show('screen-app');
      }, 800);
    };
  </script>
</body>
</html>
